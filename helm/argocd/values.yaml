global:
  domain: "" # Lab — no custom domain needed

server:
  replicas: 1 # Lab only — prd usa 2+

  # Disable TLS termination at ArgoCD (ALB handles TLS in prd)
  extraArgs:
    - --insecure

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  replicas: 1

configs:
  params:
    server.insecure: true

  # RBAC — restrict what teams can do
  rbac:
    policy.default: role:readonly # Best practice: readonly by default
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, get, *, allow
      g, argocd-admins, role:admin
