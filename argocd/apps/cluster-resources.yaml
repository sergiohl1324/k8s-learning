apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-resources
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/sergiohl1324/k8s-learning
    targetRevision: HEAD
    path: k8s/cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: default # sin efecto real: todo lo que vive en k8s/cluster es cluster-scoped
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
