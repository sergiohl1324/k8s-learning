# ClusterSecretStore en vez de un SecretStore por namespace: demo-backend-api y cualquier
# futura app en un namespace nuevo lo reusan sin duplicar este objeto (a diferencia del
# SecretStore namespaced de k8s/base/external-secret.yaml, que es específico de nginx-app).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # Sin auth.jwt.serviceAccountRef: usa la identidad IRSA del propio pod del controller
      # de External Secrets (su SA ya está anotada con el role ARN en el helm_release
      # "external_secrets" de main.tf) — mismo patrón que el SecretStore de k8s/base.
