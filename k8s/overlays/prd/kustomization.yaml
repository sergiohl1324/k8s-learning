apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app

resources:
  - ../../base

# Nota: ya no hay un patch de replicas acá. Fijar spec.replicas en Git mientras un HPA
# gestiona el mismo Deployment con selfHeal activo genera un loop infinito entre ArgoCD y el
# HPA (ver comentario en ../../base/deployment.yaml y K8S.md Incidente #9). Si prd necesita un
# piso/techo distinto de escalado, el lugar correcto es un patch sobre hpa.yaml
# (minReplicas/maxReplicas), no sobre el Deployment.

# Override image tag per environment
images:
  - name: nginxinc/nginx-unprivileged
    newTag: "1.27-alpine"

commonLabels:
  environment: prd
  probando: kustomize
