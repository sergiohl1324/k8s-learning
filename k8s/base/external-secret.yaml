apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: app
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # Sin auth.jwt.serviceAccountRef: usa la identidad del propio pod del
      # controller de External Secrets — su ServiceAccount (namespace
      # external-secrets) ya está anotada con el role ARN de IRSA en el
      # helm_release "external_secrets" de main.tf. No hace falta una SA por app.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: eks-lab/app/db-password
